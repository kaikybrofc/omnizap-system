name: Security - Build Provenance

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-attest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  attest:
    name: Attest NPM Package Provenance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20

      - name: Pack npm artifact
        id: pack
        run: |
          PACKAGE_FILE="$(npm pack --ignore-scripts --silent)"
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.package_file }}

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ steps.pack.outputs.package_file }}
