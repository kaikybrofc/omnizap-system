name: Security - Gitleaks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-gitleaks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Secret Leak Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        run: |
          docker run --rm -v "$PWD":/repo -w /repo zricethezav/gitleaks:v8.25.1 \
            git --config .gitleaks.toml --redact --verbose --report-format sarif --report-path gitleaks.sarif --exit-code 0

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98
        with:
          sarif_file: gitleaks.sarif
