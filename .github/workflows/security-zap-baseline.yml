name: Security - ZAP Baseline

on:
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for baseline scan'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: security-zap-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline-scan:
    name: DAST Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    env:
      TARGET_URL: ${{ inputs.target_url || vars.SECURITY_SCAN_TARGET_URL || 'https://omnizap.shop/' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          target: ${{ env.TARGET_URL }}
          fail_action: false
          cmd_options: '-a'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
